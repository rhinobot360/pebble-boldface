<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BoldFace Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #ffffff;
      padding: 20px;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #FF5500;
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .section {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section h2 {
      font-size: 11px;
      font-weight: 600;
      color: #FF5500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #333;
    }

    .row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .row:first-of-type {
      padding-top: 0;
    }

    label {
      font-size: 15px;
      color: #ffffff;
    }

    select {
      background: #3a3a3a;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 48px;
      height: 28px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #444;
      border-radius: 28px;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 4px;
      bottom: 4px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background: #FF5500;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .theme-preview {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
      border: 2px solid #444;
    }

    .save-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #FF5500;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .save-btn:active {
      background: #cc4400;
    }
  </style>
</head>
<body>

  <h1>BoldFace</h1>

  <div class="section">
    <h2>Theme</h2>
    <div class="row">
      <label for="theme">Color Theme</label>
      <select id="theme">
        <option value="0">🟠 Tangerine</option>
        <option value="1">🔵 Blueberry</option>
        <option value="2">🟢 Lime</option>
        <option value="3">⚫ Licorice</option>
        <option value="4">🫒 Avocado</option>
        <option value="5">🔴 Cherry</option>
        <option value="6">🟣 Grape</option>
        <option value="7">🩷 Pink Lemonade</option>
      </select>
    </div>
  </div>

  <div class="section">
    <h2>Display</h2>
    <div class="row">
      <label>Show Weather</label>
      <label class="toggle">
        <input type="checkbox" id="show_weather" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <label>Show Date</label>
      <label class="toggle">
        <input type="checkbox" id="show_date" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <label>Show Steps</label>
      <label class="toggle">
        <input type="checkbox" id="show_steps" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <h2>Weather</h2>
    <div class="row">
      <label>Use Celsius</label>
      <label class="toggle">
        <input type="checkbox" id="use_celsius">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <button class="save-btn" onclick="save()">Save Settings</button>

  <script>
    // Load saved settings from URL params if present
    function getParam(key, fallback) {
      var params = new URLSearchParams(window.location.search);
      return params.has(key) ? params.get(key) : fallback;
    }

    document.getElementById('theme').value        = getParam('theme', '0');
    document.getElementById('show_weather').checked = getParam('show_weather', '1') === '1';
    document.getElementById('show_date').checked    = getParam('show_date', '1') === '1';
    document.getElementById('show_steps').checked   = getParam('show_steps', '1') === '1';
    document.getElementById('use_celsius').checked  = getParam('use_celsius', '0') === '1';

    function save() {
      var settings = {
        'KEY_THEME':        parseInt(document.getElementById('theme').value),
        'KEY_SHOW_WEATHER': document.getElementById('show_weather').checked ? 1 : 0,
        'KEY_SHOW_DATE':    document.getElementById('show_date').checked ? 1 : 0,
        'KEY_SHOW_STEPS':   document.getElementById('show_steps').checked ? 1 : 0,
        'KEY_USE_CELSIUS':  document.getElementById('use_celsius').checked ? 1 : 0
      };
      var location = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(settings));
      document.location = location;
    }
  </script>

</body>
</html>
