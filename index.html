<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BoldFace Settings</title>
    <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-148S6H6J10"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-148S6H6J10");
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Gasoek+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #ffffff;
      padding: 20px 20px 80px 20px;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-family: 'Gasoek One', sans-serif;
      font-size: 52px;
      font-weight: 700;
      color: #FF5500;
      margin-bottom: 2px;
      text-align: center;
      letter-spacing: 2px;
      padding-bottom: 8px;

    }

    .section {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section h2 {
      font-size: 11px;
      font-weight: 600;
      color: #FF5500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #333;
    }

    .row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .row:first-of-type {
      padding-top: 0;
    }

    label {
      font-size: 15px;
      color: #ffffff;
    }

    /* Theme grid */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
      padding: 4px 0;
    }

    .theme-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .theme-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
    }

    .theme-option.selected .theme-circle {
      border-color: #ffffff;
      transform: scale(1.1);
    }

    .theme-option span {
      display: none;
    }

    .theme-option.selected span {
      color: #ffffff;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 48px;
      height: 28px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #444;
      border-radius: 28px;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 4px;
      bottom: 4px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    .temp-toggle + .slider {
      background: #FF5500;
    }

    input:checked + .slider {
      background: #FF5500;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    /* Temperature unit slider */
    .temp-unit-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 4px 0;
    }

    .temp-label {
      font-size: 16px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      transition: color 0.2s;
      width: 28px;
      text-align: center;
    }

    .temp-label.active {
      color: #ffffff;
    }


    /* Watch preview */
    .watch-preview-wrapper {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #1a1a1a;
      padding: 0;
      margin: 0 -20px 16px -20px;
    }

    .watch-preview {
      position: relative;
      width: 189px;
      height: 224px;
      margin: 0 auto;
      display: block;
    }

    .watch-preview img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .watch-preview .layer-features {
      transition: opacity 0.3s;
    }

    .watch-preview .layer-features.hidden {
      opacity: 0;
    }

    .theme-name-bar {
      text-align: center;
      padding: 10px 20px;
      margin: 0;
      font-size: 15px;
      color: #ffffff;
      background: #111111;
    }

    .save-btn {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      padding: 16px;
      background: #FF5500;
      color: white;
      border: none;
      border-radius: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      z-index: 100;
    }

    .fade-overlay {
      position: fixed;
      bottom: 52px;
      left: 0;
      right: 0;
      height: 72px;
      background: linear-gradient(to bottom, transparent, #1a1a1a);
      pointer-events: none;
      z-index: 99;
      transition: opacity 0.3s;
    }

    .fade-overlay.hidden {
      opacity: 0;
    }

    .save-btn:active {
      background: #cc4400;
    }
  </style>
</head>
<body>

  <h1>BoldFace</h1>

  <!-- Watch Preview -->
  <div class="watch-preview-wrapper">
  <div class="watch-preview" id="watch-preview">
    <img src="watchface-tangerine.png" id="preview-watchface" alt="watchface">
    <img src="watchface-tangerine-calendar.png" id="preview-calendar" class="layer-features" alt="calendar">
    <img src="watchface-tangerine-weather.png" id="preview-weather" class="layer-features" alt="weather">
    <img src="watchface-tangerine-steps.png" id="preview-steps" class="layer-features" alt="steps">
    <img src="pebble-watch.png" id="preview-frame" alt="watch frame">
  </div>
  <div class="theme-name-bar" id="theme-name-bar">Tangerine</div>
  </div>

  <!-- Theme -->
  <div class="section">
    <!-- ROYGBIV order: Licorice, Cherry, Tangerine, Pink Lemonade, Avocado, Lime, Blueberry, Grape -->
    <!-- Values map to main.c THEME_BG array index -->
    <div class="theme-grid">
      <div class="theme-option" data-value="3" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#000000;"></div>
        <span>Licorice</span>
      </div>
      <div class="theme-option" data-value="5" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#aa0000;"></div>
        <span>Cherry</span>
      </div>
      <div class="theme-option" data-value="0" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#ff5500;"></div>
        <span>Tangerine</span>
      </div>
      <div class="theme-option" data-value="7" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#ffff00;"></div>
        <span>Pink Lemonade</span>
      </div>
      <div class="theme-option" data-value="4" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#555500;"></div>
        <span>Avocado</span>
      </div>
      <div class="theme-option" data-value="2" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#005500;"></div>
        <span>Lime</span>
      </div>
      <div class="theme-option" data-value="1" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#000055;"></div>
        <span>Blueberry</span>
      </div>
      <div class="theme-option" data-value="6" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#aa00aa;"></div>
        <span>Grape</span>
      </div>
    </div>
    <input type="hidden" id="theme" value="0">
  </div>

  <!-- Display toggles -->
  <div class="section">
    <h2>Display</h2>
    <div class="row">
      <label>Show Weather</label>
      <label class="toggle">
        <input type="checkbox" id="show_weather" checked onchange="updateFeaturesPreview()">
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <label>Show Date</label>
      <label class="toggle">
        <input type="checkbox" id="show_date" checked onchange="updateFeaturesPreview()">
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <label>Show Steps</label>
      <label class="toggle">
        <input type="checkbox" id="show_steps" checked onchange="updateFeaturesPreview()">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- Temperature unit -->
  <div class="section">
    <h2>Temperature Unit</h2>
    <div class="temp-unit-row">
      <span class="temp-label active" id="label_f">°F</span>
      <label class="toggle">
        <input type="checkbox" id="use_celsius" class="temp-toggle" onchange="updateTempLabels()">
        <span class="slider"></span>
      </label>
      <span class="temp-label" id="label_c">°C</span>
    </div>
  </div>

  <!-- Clock Format -->
  <div class="section">
    <h2>Clock Format</h2>
    <div class="temp-unit-row">
      <span class="temp-label active" id="label_12">12h</span>
      <label class="toggle">
        <input type="checkbox" id="use_24h" class="temp-toggle" onchange="updateClockLabels()">
        <span class="slider"></span>
      </label>
      <span class="temp-label" id="label_24">24h</span>
    </div>
  </div>

  <div class="fade-overlay" id="fade-overlay"></div>
  <button class="save-btn" onclick="save()">Save Settings</button>

  <script>
    window.addEventListener('scroll', function() {
      var scrollBottom = window.innerHeight + window.scrollY;
      var pageHeight = document.documentElement.scrollHeight;
      var overlay = document.getElementById('fade-overlay');
      if (scrollBottom >= pageHeight - 10) {
        overlay.classList.add('hidden');
      } else {
        overlay.classList.remove('hidden');
      }
    });

    function getParam(key, fallback) {
      var params = new URLSearchParams(window.location.search);
      return params.has(key) ? params.get(key) : fallback;
    }

    // Theme selection
    var THEME_COLORS = {
      '0': '#ff5500',
      '1': '#000055',
      '2': '#005500',
      '3': '#000000',
      '4': '#555500',
      '5': '#aa0000',
      '6': '#aa00aa',
      '7': '#ffff00'
    };

    var THEME_LABELS = {
      '0': 'Tangerine',
      '1': 'Blueberry',
      '2': 'Lime',
      '3': 'Licorice',
      '4': 'Avocado',
      '5': 'Cherry',
      '6': 'Grape',
      '7': 'Pink Lemonade'
    };

    var THEME_WATCHFACES = {
      '0': 'watchface-tangerine.png',
      '1': 'watchface-blueberry.png',
      '2': 'watchface-lime.png',
      '3': 'watchface-licorice.png',
      '4': 'watchface-avocado.png',
      '5': 'watchface-cherry.png',
      '6': 'watchface-grape.png',
      '7': 'watchface-pink-lemonade.png'
    };

    var THEME_CALENDAR = {
      '0': 'watchface-tangerine-calendar.png',
      '1': 'watchface-blueberry-calendar.png',
      '2': 'watchface-lime-calendar.png',
      '3': 'watchface-licorice-calendar.png',
      '4': 'watchface-avocado-calendar.png',
      '5': 'watchface-cherry-calendar.png',
      '6': 'watchface-grape-calendar.png',
      '7': 'watchface-pink-lemonade-calendar.png'
    };

    var THEME_WEATHER = {
      '0': 'watchface-tangerine-weather.png',
      '1': 'watchface-blueberry-weather.png',
      '2': 'watchface-lime-weather.png',
      '3': 'watchface-licorice-weather.png',
      '4': 'watchface-avocado-weather.png',
      '5': 'watchface-cherry-weather.png',
      '6': 'watchface-grape-weather.png',
      '7': 'watchface-pink-lemonade-weather.png'
    };

    var THEME_STEPS = {
      '0': 'watchface-tangerine-steps.png',
      '1': 'watchface-blueberry-steps.png',
      '2': 'watchface-lime-steps.png',
      '3': 'watchface-licorice-steps.png',
      '4': 'watchface-avocado-steps.png',
      '5': 'watchface-cherry-steps.png',
      '6': 'watchface-grape-steps.png',
      '7': 'watchface-pink-lemonade-steps.png'
    };

    function selectTheme(el) {
      document.querySelectorAll('.theme-option').forEach(function(o) {
        o.classList.remove('selected');
      });
      el.classList.add('selected');
      var val = el.getAttribute('data-value');
      document.getElementById('theme').value = val;
      document.getElementById('preview-watchface').src = THEME_WATCHFACES[val] || 'watchface-tangerine.png';
      document.getElementById('preview-calendar').src = THEME_CALENDAR[val] || 'watchface-tangerine-calendar.png';
      document.getElementById('preview-weather').src = THEME_WEATHER[val] || 'watchface-tangerine-weather.png';
      document.getElementById('preview-steps').src = THEME_STEPS[val] || 'watchface-tangerine-steps.png';
      document.getElementById('theme-name-bar').textContent = THEME_LABELS[val] || 'Tangerine';
    }

    // Temp label update
    function updateFeaturesPreview() {
      var showWeather = document.getElementById('show_weather').checked;
      var showDate    = document.getElementById('show_date').checked;
      var showSteps   = document.getElementById('show_steps').checked;

      document.getElementById('preview-weather').classList.toggle('hidden', !showWeather);
      document.getElementById('preview-calendar').classList.toggle('hidden', !showDate);
      document.getElementById('preview-steps').classList.toggle('hidden', !showSteps);
    }

    function updateClockLabels() {
      var is24h = document.getElementById('use_24h').checked;
      document.getElementById('label_12').classList.toggle('active', !is24h);
      document.getElementById('label_24').classList.toggle('active', is24h);
    }

    function updateTempLabels() {
      var isCelsius = document.getElementById('use_celsius').checked;
      document.getElementById('label_f').classList.toggle('active', !isCelsius);
      document.getElementById('label_c').classList.toggle('active', isCelsius);
    }

    // Load saved settings
    var savedTheme = getParam('theme', '0');
    document.getElementById('show_weather').checked = getParam('show_weather', '1') === '1';
    document.getElementById('show_date').checked    = getParam('show_date', '1') === '1';
    document.getElementById('show_steps').checked   = getParam('show_steps', '1') === '1';
    document.getElementById('use_celsius').checked  = getParam('use_celsius', '0') === '1';
    document.getElementById('use_24h').checked       = getParam('use_24h', '0') === '1';
    updateClockLabels();
    document.getElementById('theme').value = savedTheme;
    updateTempLabels();

    updateFeaturesPreview();

    // Set theme bar on load
    document.getElementById('theme-name-bar').textContent = THEME_LABELS[savedTheme] || 'Tangerine';

    // Highlight saved theme
    var savedOption = document.querySelector('.theme-option[data-value="' + savedTheme + '"]');
    if (savedOption) savedOption.classList.add('selected');

    var THEME_NAMES = ['Tangerine','Blueberry','Lime','Licorice','Avocado','Cherry','Grape','Pink Lemonade'];

    function save() {
      var themeIndex  = parseInt(document.getElementById('theme').value);
      var showWeather = document.getElementById('show_weather').checked;
      var showDate    = document.getElementById('show_date').checked;
      var showSteps   = document.getElementById('show_steps').checked;
      var useCelsius  = document.getElementById('use_celsius').checked;
      var use24h      = document.getElementById('use_24h').checked;

      var settings = {
        'KEY_THEME':        themeIndex,
        'KEY_SHOW_WEATHER': showWeather ? 1 : 0,
        'KEY_SHOW_DATE':    showDate    ? 1 : 0,
        'KEY_SHOW_STEPS':   showSteps   ? 1 : 0,
        'KEY_USE_CELSIUS':  useCelsius  ? 1 : 0,
        'KEY_USE_24H':      use24h      ? 1 : 0
      };

      gtag('event', 'save_settings', {
        'theme':        THEME_NAMES[themeIndex],
        'show_weather': showWeather ? 'on' : 'off',
        'show_date':    showDate    ? 'on' : 'off',
        'show_steps':   showSteps   ? 'on' : 'off',
        'temp_unit':    useCelsius  ? 'celsius' : 'fahrenheit',
        'clock_format': use24h      ? '24h' : '12h'
      });

      var location = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(settings));
      document.location = location;
    }
  </script>

</body>
</html>
