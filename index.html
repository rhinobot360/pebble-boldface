<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BoldFace Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #ffffff;
      padding: 20px;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #FF5500;
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .section {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section h2 {
      font-size: 11px;
      font-weight: 600;
      color: #FF5500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #333;
    }

    .row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .row:first-of-type {
      padding-top: 0;
    }

    label {
      font-size: 15px;
      color: #ffffff;
    }

    /* Theme grid */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 4px 0;
    }

    .theme-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .theme-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
    }

    .theme-option.selected .theme-circle {
      border-color: #ffffff;
      transform: scale(1.1);
    }

    .theme-option span {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-align: center;
      line-height: 1.2;
    }

    .theme-option.selected span {
      color: #ffffff;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 48px;
      height: 28px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #444;
      border-radius: 28px;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 4px;
      bottom: 4px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    .temp-toggle + .slider {
      background: #FF5500;
    }

    input:checked + .slider {
      background: #FF5500;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    /* Temperature unit slider */
    .temp-unit-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 4px 0;
    }

    .temp-label {
      font-size: 16px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      transition: color 0.2s;
      width: 28px;
      text-align: center;
    }

    .temp-label.active {
      color: #ffffff;
    }

    .save-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #444;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .save-btn:active {
      background: #cc4400;
    }
  </style>
</head>
<body>

  <h1>BoldFace</h1>

  <!-- Theme -->
  <div class="section">
    <h2>Color Theme</h2>
    <!-- ROYGBIV order: Cherry, Tangerine, Pink Lemonade, Lime, Avocado, Blueberry, Grape, Licorice -->
    <!-- Values map to main.c THEME_BG array index -->
    <div class="theme-grid">
      <div class="theme-option" data-value="5" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#550000;"></div>
        <span>Cherry</span>
      </div>
      <div class="theme-option" data-value="0" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#FF5500;"></div>
        <span>Tangerine</span>
      </div>
      <div class="theme-option" data-value="7" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#FFFF00;"></div>
        <span>Pink Lemonade</span>
      </div>
      <div class="theme-option" data-value="2" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#004400;"></div>
        <span>Lime</span>
      </div>
      <div class="theme-option" data-value="4" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#445500;"></div>
        <span>Avocado</span>
      </div>
      <div class="theme-option" data-value="1" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#001055;"></div>
        <span>Blueberry</span>
      </div>
      <div class="theme-option" data-value="6" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#330044;"></div>
        <span>Grape</span>
      </div>
      <div class="theme-option" data-value="3" onclick="selectTheme(this)">
        <div class="theme-circle" style="background:#000000; border: 2px solid #333;"></div>
        <span>Licorice</span>
      </div>
    </div>
    <input type="hidden" id="theme" value="0">
  </div>

  <!-- Display toggles -->
  <div class="section">
    <h2>Display</h2>
    <div class="row">
      <label>Show Weather</label>
      <label class="toggle">
        <input type="checkbox" id="show_weather" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <label>Show Date</label>
      <label class="toggle">
        <input type="checkbox" id="show_date" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <label>Show Steps</label>
      <label class="toggle">
        <input type="checkbox" id="show_steps" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- Temperature unit -->
  <div class="section">
    <h2>Temperature Unit</h2>
    <div class="temp-unit-row">
      <span class="temp-label active" id="label_f">F°</span>
      <label class="toggle">
        <input type="checkbox" id="use_celsius" class="temp-toggle" onchange="updateTempLabels()">
        <span class="slider"></span>
      </label>
      <span class="temp-label" id="label_c">C°</span>
    </div>
  </div>

  <!-- Clock Format -->
  <div class="section">
    <h2>Clock Format</h2>
    <div class="temp-unit-row">
      <span class="temp-label active" id="label_12">12h</span>
      <label class="toggle">
        <input type="checkbox" id="use_24h" class="temp-toggle" onchange="updateClockLabels()">
        <span class="slider"></span>
      </label>
      <span class="temp-label" id="label_24">24h</span>
    </div>
  </div>

  <button class="save-btn" onclick="save()">Save Settings</button>

  <script>
    function getParam(key, fallback) {
      var params = new URLSearchParams(window.location.search);
      return params.has(key) ? params.get(key) : fallback;
    }

    // Theme selection
    function selectTheme(el) {
      document.querySelectorAll('.theme-option').forEach(function(o) {
        o.classList.remove('selected');
      });
      el.classList.add('selected');
      document.getElementById('theme').value = el.getAttribute('data-value');
    }

    // Temp label update
    function updateClockLabels() {
      var is24h = document.getElementById('use_24h').checked;
      document.getElementById('label_12').classList.toggle('active', !is24h);
      document.getElementById('label_24').classList.toggle('active', is24h);
    }

    function updateTempLabels() {
      var isCelsius = document.getElementById('use_celsius').checked;
      document.getElementById('label_f').classList.toggle('active', !isCelsius);
      document.getElementById('label_c').classList.toggle('active', isCelsius);
    }

    // Load saved settings
    var savedTheme = getParam('theme', '0');
    document.getElementById('show_weather').checked = getParam('show_weather', '1') === '1';
    document.getElementById('show_date').checked    = getParam('show_date', '1') === '1';
    document.getElementById('show_steps').checked   = getParam('show_steps', '1') === '1';
    document.getElementById('use_celsius').checked  = getParam('use_celsius', '0') === '1';
    document.getElementById('use_24h').checked       = getParam('use_24h', '0') === '1';
    updateClockLabels();
    document.getElementById('theme').value = savedTheme;
    updateTempLabels();

    // Highlight saved theme
    var savedOption = document.querySelector('.theme-option[data-value="' + savedTheme + '"]');
    if (savedOption) savedOption.classList.add('selected');

    function save() {
      var settings = {
        'KEY_THEME':        parseInt(document.getElementById('theme').value),
        'KEY_SHOW_WEATHER': document.getElementById('show_weather').checked ? 1 : 0,
        'KEY_SHOW_DATE':    document.getElementById('show_date').checked ? 1 : 0,
        'KEY_SHOW_STEPS':   document.getElementById('show_steps').checked ? 1 : 0,
        'KEY_USE_CELSIUS':  document.getElementById('use_celsius').checked ? 1 : 0,
        'KEY_USE_24H':      document.getElementById('use_24h').checked ? 1 : 0
      };
      var location = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(settings));
      document.location = location;
    }
  </script>

</body>
</html>
